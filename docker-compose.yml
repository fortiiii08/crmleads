version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crmleads_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crmleads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crmleads_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/crmleads
      JWT_SECRET: crm-juridico-secret-2026
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crmleads_web
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
